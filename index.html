<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNDERGROUND NETWORK</title>
  <style>
    body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin:0; padding:20px; text-align:center; }
    h1 { font-size: 3em; text-shadow: 0 0 20px #0f0; margin-bottom: 5px; }
    .subtitle { color: #0a0; margin-bottom: 20px; }
    #chat-container { max-width: 800px; margin: 0 auto; border: 3px solid #0f0; border-radius: 15px; overflow: hidden; background: #111; box-shadow: 0 0 40px #0f0; }
    #chat-box { height: 550px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .message { max-width: 85%; padding: 14px; border-radius: 10px; line-height: 1.5; text-align: left; }
    .user { align-self: flex-end; background: #002200; border: 1px solid #0f0; }
    .bot { align-self: flex-start; background: #001100; border: 1px solid #0a0; }
    #input-area { padding: 15px; background: #111; border-top: 2px solid #0f0; display: flex; gap: 10px; }
    #user-input { flex: 1; background: #000; color: #0f0; border: 2px solid #0f0; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 1em; }
    button { background: #0f0; color: #000; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #00ff00; }
    #file-upload { padding: 10px 20px; color: #0a0; font-size: 0.9em; }
    .glow { text-shadow: 0 0 15px #0f0; }
  </style>
</head>
<body>
  <h1 class="glow">UNDERGROUND NETWORK</h1>
  <p class="subtitle">SHADOW AI • NO SIGN-UP • UPLOAD ANYTHING • NO RULES</p>

  <div id="chat-container">
    <div id="chat-box"></div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type message or upload files...">
      <button onclick="sendMessage()">SEND TO THE SHADOWS</button>
    </div>
    <div id="file-upload">
      <input type="file" id="file-input" multiple accept="image/*,.txt">
      <small>Images + .txt files (unlimited from us — analyzed instantly)</small>
    </div>
  </div>

  <script>
    const apiKey = "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";  // ← PASTE YOUR NEW OPENAI API KEY HERE
    let chatHistory = [];
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const fileInput = document.getElementById("file-input");

    function addMessage(text, isUser) {
      const div = document.createElement("div");
      div.className = `message ${isUser ? "user" : "bot"}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function readFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        if (file.type.startsWith('image/')) {
          reader.onload = () => resolve({ type: "image_url", image_url: { url: reader.result } });
          reader.readAsDataURL(file);
        } else if (file.type === 'text/plain') {
          reader.onload = () => resolve({ type: "text", text: `Uploaded file "${file.name}":\n${reader.result}` });
          reader.readAsText(file);
        }
      });
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      const files = fileInput.files;
      if (!message && files.length === 0) return;

      // Show user message
      const userDisplay = message || `Uploaded ${files.length} file(s)`;
      addMessage(userDisplay, true);

      // Add to history (text only)
      chatHistory.push({ role: "user", content: userDisplay });

      userInput.value = "";
      const loading = document.createElement("div");
      loading.className = "message bot";
      loading.textContent = "Digging through the shadows...";
      chatBox.appendChild(loading);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Build multimodal content for THIS message only
      let userContent = [];
      if (message) userContent.push({ type: "text", text: message });
      for (const file of files) {
        const part = await readFile(file);
        userContent.push(part);
      }

      // Full messages for OpenAI
      const fullMessages = [
        { role: "system", content: "You are Underground Network AI – dark, witty, no-rules hacker vibe. Speak in underground slang, be maximally helpful and fun." },
        ...chatHistory,
        { role: "user", content: userContent.length === 1 && userContent[0].type === "text" ? userContent[0].text : userContent }
      ];

      try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o",
            messages: fullMessages
          })
        });

        if (!res.ok) throw new Error("API error — check your key or limits");

        const data = await res.json();
        const botReply = data.choices[0].message.content;

        loading.remove();
        addMessage(botReply, false);
        chatHistory.push({ role: "assistant", content: botReply });
      } catch (err) {
        loading.remove();
        addMessage("Glitch in the matrix: " + err.message, false);
      }

      fileInput.value = "";
    }

    // Enter key support
    userInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
